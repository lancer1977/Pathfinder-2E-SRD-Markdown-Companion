name: Pathfinder-2E-SRD-Markdown-Companion
repo_root: .

languages:
  - csharp
  - razor
  - markdown

frameworks:
  - dotnet
  - blazor
  - mudblazor

ci:
  build:
    - dotnet build PathfinderRagChatUi.sln
  test:
    - dotnet test PathfinderRagChatUi.sln

devstudio:
  runtime_model: three-agent
  backlog_ordering: filename
  skip_promoted_planning: true
  one_stage_per_run: true
