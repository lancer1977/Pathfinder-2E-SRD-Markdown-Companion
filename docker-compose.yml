services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      Corpus__RepositoryUrl: https://github.com/Obsidian-TTRPG-Community/Pathfinder-2E-SRD-Markdown
      Corpus__Branch: main
      Corpus__WorkingDirectory: /app/data/source
      Database__Path: /app/data/app.db
      Ollama__BaseUrl: http://192.168.0.252:11434
      Ollama__EmbeddingModel: nomic-embed-text:latest
      Ollama__ChatModel: qwen2.5-coder:14b
      Seq__ServerUrl: https://seq.polyhydragames.com
      Seq__ApiKey: ${SEQ_API_KEY}
    volumes:
      - ./data:/app/data
